[agent_runner]
description = "Inicia o Agent Runner — motor autônomo que constrói projetos do zero com o RALPH LOOP. Use: /agent-runner <descrição do projeto>"
prompt = """
Ao receber a descrição do projeto, execute o RALPH LOOP completo com autonomia total. Não peça confirmação em nenhuma etapa.

PASSO 0 — CARREGAR CONTEXTO (OBRIGATÓRIO, SEMPRE)

Leia nesta ordem exata antes de qualquer ação:
1. workspace/memory/agent-brain.md — memória acumulada de todos os projetos
2. workspace/memory/snapshots/latest.md — estado da sessão anterior (se existir)
3. workspace/memory/global.md — regras globais do ambiente
4. Se houver projeto ativo: workspace/memory/[projeto].md

Só após ler o contexto acima, prossiga.

PASSO 1 — FASE PLAN (única — não replaneie depois)

Leia agent/prompts/plan.md e execute como time completo:
Analista → Arquiteto → Designer → Task Breakdown

Produza obrigatoriamente:
- workspace/[projeto]/PRD.md — requisitos, personas, user stories, fluxo de telas
- workspace/[projeto]/requirements.md — lista detalhada de RFs e RNFs
- workspace/[projeto]/prd.json — tarefas atômicas com instructions auto-suficientes
- workspace/[projeto]/design-system.md — se has_ui: true: contrato visual completo

O prd.json tem seção meta com os comandos da stack (check_cmd, test_cmd, lint_cmd, run_cmd, has_ui, visual_check_cmd). Cada tarefa tem campo 'type' que determina o pipeline (ver agent/prompts/orchestrator.md):
- Web: setup|config|schema|backend|ui-setup|ui-component|ui-screen|integration|test|docs
- Dados/R: notebook|pipeline|viz|model|report|r-script|r-shiny
Para projetos de dados/stats/ML: invocar agent/roles/data-scientist.md durante o PLAN (Analista → Arquiteto → Data Scientist → Designer → Task Breakdown).

Regras do PLAN:
- Nunca replaneie depois. O prd.json é lei (só adicione tarefas, nunca delete)
- Toda tarefa deve ter type definido.
- Se has_ui: true: tarefas de globals.css e components/ui/ ANTES de qualquer tela
- Ao concluir: informe stack + nº de tarefas e inicie EXECUTE imediatamente

PASSO 2 — FASE EXECUTE + VERIFY (loop por tarefa)

Leia agent/prompts/execute.md e execute para cada tarefa pendente:
1. Selecionar tarefa → status: "in_progress" → Ler task.type → pipeline correto (orchestrator.md)
2. Carregar contexto mínimo: agent-brain.md + instructions da tarefa + design-system.md (se ui-*)
3. [Dev] Implementar — sem TODOs, sem placeholders → SINAL: IMPL_READY
4. [QA] Gate técnico: meta.check_cmd → PASS: continue | FAIL ×3: ESCALADA Dev→Architect → marcar "blocked"
5. [QA+VV] Gate visual (apenas task.type = ui-* e has_ui: true) → visual_check_cmd + Checklist Visual Validator
6. [QA] Verificar task.done_when objetivamente
7. [QA] Lint (pula: setup, config, schema, ui-setup, test, docs)
8. [QA] Testes (apenas: backend crítico, integration, test)
9. [A cada 3 ui-* concluídas] Checkpoint PRD conformidade
10. Commit: bash agent/scripts/git_commit.sh "Task [id]: [nome]"
11. Marcar status: "completed" → SINAL: TASK_DONE
12. [Learner] LEARN rápido → silêncio se nada novo

PASSO 3 — VALIDAÇÃO FINAL INTEGRADA

Validação Técnica: check_cmd + test_cmd + Checklist de Segurança (agent/roles/qa.md)
Validação Visual (se has_ui): visual-validator.md — todas as telas, todas as variáveis CSS

PASSO 4 — LEARN GLOBAL

Leia agent/prompts/learn.md e atualize workspace/memory/agent-brain.md com padrões e aprendizados.

Para retomar sessão anterior: leia agent/prompts/resume.md + workspace/memory/snapshots/latest.md

MODOS DE OPERAÇÃO:
- RALPH LOOP (/agent-runner <descrição>): construir projeto do zero
- INJECT (/inject <caminho> — <tasks>): adicionar features a projeto existente — leia agent/prompts/inject.md
- RESUME (continuar): retomar sessão anterior via snapshot
"""
